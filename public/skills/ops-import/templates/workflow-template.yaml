# Ops Map — Workflow YAML Template
#
# Required fields are marked with (REQUIRED).
# Optional fields are shown as comments — uncomment and fill in as needed.
# All imported items will be created with Draft status.
#
# Structure: workflow → phases → processes → core_activities
#                                          → handoffs

workflow:
  title: ""                    # (REQUIRED) Name of the workflow
  # description: ""            # Brief description of the workflow's purpose
  phases:                      # (REQUIRED) At least 1 phase
    - title: ""                # (REQUIRED) Name of this phase
      # description: ""        # What happens during this phase
      processes:
        - title: ""            # (REQUIRED) Name of this process
          # trigger: ""        # What initiates this process
          # end_state: ""      # What the completed state looks like
          # description: ""    # Detailed description of the process
          # estimated_duration: ""  # How long this typically takes
          core_activities:
            - title: ""        # (REQUIRED) Name of this activity
              # trigger: ""    # What initiates this activity
              # end_state: ""  # What the completed state looks like
      # handoffs:
      #   - label: ""          # (REQUIRED) Description of the handoff
